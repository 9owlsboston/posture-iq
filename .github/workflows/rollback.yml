# PostureIQ — Rollback Workflow
#
# Manually roll back to a previously-pushed container image by Git SHA.
# Uses workflow_dispatch so operators can trigger from the GitHub UI or CLI:
#
#   gh workflow run rollback.yml -f image_tag=abc1234 -f environment=dev
#
# Authentication: OIDC Workload Identity Federation (zero stored secrets)

name: Rollback

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Git SHA of the image to roll back to (short hash, e.g. abc1234)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

permissions:
  contents: read
  id-token: write

env:
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP || 'rg-postureiq-dev' }}
  CONTAINER_IMAGE_NAME: "postureiq"

jobs:
  rollback:
    name: Rollback to ${{ inputs.image_tag }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR login server
        id: acr
        run: |
          LOGIN_SERVER=$(az acr list --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[0].loginServer" -o tsv)
          echo "LOGIN_SERVER=$LOGIN_SERVER" >> $GITHUB_OUTPUT

      - name: Verify image exists in ACR
        run: |
          ACR_NAME=$(echo "${{ steps.acr.outputs.LOGIN_SERVER }}" | cut -d. -f1)
          IMAGE_TAG="${{ inputs.image_tag }}"
          echo "Checking $ACR_NAME for ${{ env.CONTAINER_IMAGE_NAME }}:${IMAGE_TAG}..."
          az acr repository show-tags \
            --name "$ACR_NAME" \
            --repository "${{ env.CONTAINER_IMAGE_NAME }}" \
            --query "[?@=='${IMAGE_TAG}']" -o tsv | grep -q . || {
              echo "::error::Image tag '${IMAGE_TAG}' not found in ACR"
              exit 1
            }
          echo "✅ Image tag '${IMAGE_TAG}' found"

      - name: Deploy rollback via Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: >-
            ./infra/parameters/${{ inputs.environment }}.bicepparam
            containerImage=${{ steps.acr.outputs.LOGIN_SERVER }}/${{ env.CONTAINER_IMAGE_NAME }}:${{ inputs.image_tag }}
          failOnStdErr: false

      - name: Post-rollback health check
        run: |
          APP_FQDN=$(az containerapp list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[0].properties.configuration.ingress.fqdn" -o tsv)

          if [[ -z "$APP_FQDN" ]]; then
            echo "::warning::Could not resolve Container App FQDN — skipping health check"
            exit 0
          fi

          APP_URL="https://${APP_FQDN}"
          echo "Health-checking $APP_URL/health ..."

          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/health" || true)
            if [[ "$STATUS" == "200" ]]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i/5 — HTTP $STATUS, retrying in 15s..."
            sleep 15
          done

          echo "::error::Health check failed after rollback"
          exit 1

      - name: Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const summary = [
              `## ${status} Rollback to \`${{ inputs.image_tag }}\``,
              '',
              `| Detail | Value |`,
              `|--------|-------|`,
              `| **Image Tag** | \`${{ inputs.image_tag }}\` |`,
              `| **Environment** | ${{ inputs.environment }} |`,
              `| **Resource Group** | \`${{ env.RESOURCE_GROUP }}\` |`,
              `| **Status** | ${{ job.status }} |`,
            ].join('\n');
            await core.summary.addRaw(summary).write();
