# SecPostureIQ — PR Preview Environment
#
# Deploys a temporary dev environment for each PR, so reviewers
# can test changes live before merging to main.
# Automatically tears down the environment when the PR is closed.
#
# Authentication: OIDC Workload Identity Federation (zero stored secrets)

name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write  # Required for OIDC token request

env:
  PYTHON_VERSION: "3.11"
  RESOURCE_GROUP_PREFIX: "rg-secpostureiq-pr"
  LOCATION: "eastus2"
  CONTAINER_IMAGE_NAME: "secpostureiq"

jobs:
  # ── Deploy preview environment on PR open/update ───────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install and test
        run: |
          pip install -e ".[dev]"
          pytest --cov=src --cov-fail-under=80 -q

      - name: Set PR metadata
        id: meta
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          echo "pr-num=$PR_NUM" >> $GITHUB_OUTPUT
          echo "rg-name=${{ env.RESOURCE_GROUP_PREFIX }}-${PR_NUM}" >> $GITHUB_OUTPUT
          echo "git-sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --build-arg GIT_SHA=${{ steps.meta.outputs.git-sha }} \
            --build-arg BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t ${{ env.CONTAINER_IMAGE_NAME }}:pr-${{ steps.meta.outputs.pr-num }} \
            .

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create PR resource group
        run: |
          az group create \
            --name ${{ steps.meta.outputs.rg-name }} \
            --location ${{ env.LOCATION }} \
            --tags project=secpostureiq environment=pr pr=${{ steps.meta.outputs.pr-num }}

      - name: Get ACR login server
        id: acr
        run: |
          LOGIN_SERVER=$(az acr list --resource-group ${{ vars.RESOURCE_GROUP || 'rg-secpostureiq-dev' }} \
            --query "[0].loginServer" -o tsv)
          echo "LOGIN_SERVER=$LOGIN_SERVER" >> $GITHUB_OUTPUT

      - name: Login to ACR (OIDC)
        run: az acr login --name $(echo "${{ steps.acr.outputs.LOGIN_SERVER }}" | cut -d. -f1)

      - name: Tag and push PR image
        run: |
          docker tag ${{ env.CONTAINER_IMAGE_NAME }}:pr-${{ steps.meta.outputs.pr-num }} \
            ${{ steps.acr.outputs.LOGIN_SERVER }}/${{ env.CONTAINER_IMAGE_NAME }}:pr-${{ steps.meta.outputs.pr-num }}
          docker push ${{ steps.acr.outputs.LOGIN_SERVER }}/${{ env.CONTAINER_IMAGE_NAME }}:pr-${{ steps.meta.outputs.pr-num }}

      # ── Pre-create managed identity & grant AcrPull BEFORE Bicep deploy ──
      # The Container App needs AcrPull on the shared dev ACR at deploy time
      # (not after). We pre-create the identity so the role assignment propagates
      # before the Bicep template deploys the Container App.
      - name: Pre-create Managed Identity
        id: identity
        run: |
          IDENTITY_NAME="secpostureiq-pr${{ steps.meta.outputs.pr-num }}-dev-app-identity"
          RG_NAME="${{ steps.meta.outputs.rg-name }}"

          az identity create \
            --name "$IDENTITY_NAME" \
            --resource-group "$RG_NAME" \
            --location ${{ env.LOCATION }} \
            --output none

          PRINCIPAL_ID=$(az identity show \
            --name "$IDENTITY_NAME" \
            --resource-group "$RG_NAME" \
            --query principalId -o tsv)
          echo "principalId=$PRINCIPAL_ID" >> $GITHUB_OUTPUT

      - name: Grant AcrPull on dev ACR to PR managed identity
        run: |
          DEV_ACR_ID=$(az acr show \
            --name $(echo "${{ steps.acr.outputs.LOGIN_SERVER }}" | cut -d. -f1) \
            --query id -o tsv)

          # Idempotent — succeeds even if the role assignment already exists
          az role assignment create \
            --assignee-object-id "${{ steps.identity.outputs.principalId }}" \
            --assignee-principal-type ServicePrincipal \
            --role AcrPull \
            --scope "$DEV_ACR_ID" \
            --output none 2>/dev/null || true

      - name: Wait for role assignment propagation
        run: sleep 30

      - name: Deploy PR environment
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ steps.meta.outputs.rg-name }}
          template: ./infra/main.bicep
          parameters: >-
            environment=dev
            location=${{ env.LOCATION }}
            projectName=secpostureiq-pr${{ steps.meta.outputs.pr-num }}
            containerImage=${{ steps.acr.outputs.LOGIN_SERVER }}/${{ env.CONTAINER_IMAGE_NAME }}:pr-${{ steps.meta.outputs.pr-num }}
            acrLoginServerOverride=${{ steps.acr.outputs.LOGIN_SERVER }}
            azureTenantId=${{ secrets.AZURE_TENANT_ID }}
            entraAppClientId=${{ vars.ENTRA_APP_CLIENT_ID }}
          failOnStdErr: false

      - name: Get preview URL
        id: preview
        run: |
          APP_FQDN=${{ steps.deploy.outputs.containerAppUrl }}
          echo "url=https://${APP_FQDN}" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = ${{ steps.meta.outputs.pr-num }};
            const sha = '${{ steps.meta.outputs.git-sha }}';
            const previewUrl = '${{ steps.preview.outputs.url }}';
            const body = [
              '## 🚀 Preview Environment',
              '',
              `| Detail | Value |`,
              `|--------|-------|`,
              `| **Commit** | \`${sha}\` |`,
              `| **Resource Group** | \`${{ steps.meta.outputs.rg-name }}\` |`,
              `| **Preview URL** | ${previewUrl} |`,
              `| **Status** | ✅ Deployed successfully |`,
              '',
              '_This environment will be automatically torn down when the PR is closed._'
            ].join('\n');

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });
            const botComment = comments.find(c => c.body.includes('Preview Environment'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }

  # ── Tear down preview environment on PR close ──────────
  teardown-preview:
    name: Teardown Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Set PR metadata
        id: meta
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          echo "rg-name=${{ env.RESOURCE_GROUP_PREFIX }}-${PR_NUM}" >> $GITHUB_OUTPUT

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete PR resource group
        run: |
          RG_EXISTS=$(az group exists --name ${{ steps.meta.outputs.rg-name }})
          if [[ "$RG_EXISTS" == "true" ]]; then
            az group delete \
              --name ${{ steps.meta.outputs.rg-name }} \
              --yes --no-wait
            echo "🗑️ Deleted resource group: ${{ steps.meta.outputs.rg-name }}"
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const prNum = pr.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });
            const botComment = comments.find(c => c.body.includes('Preview Environment'));

            if (botComment) {
              const body = [
                '## 🚀 Preview Environment',
                '',
                '| Detail | Value |',
                '|--------|-------|',
                `| **Status** | 🗑️ Torn down (PR ${pr.merged ? 'merged' : 'closed'}) |`,
              ].join('\n');

              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            }
